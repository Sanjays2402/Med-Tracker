{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "med-api.fullname" . }}
  labels:
    {{- include "med-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "med-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.prometheusNamespaceSelector | nindent 12 }}
      ports:
        - port: 4000
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Database
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.databaseCIDR }}
      ports:
        - port: {{ .Values.networkPolicy.databasePort }}
          protocol: TCP
    # HTTPS egress (Sentry, etc). Restrict further per environment.
    - ports:
        - port: 443
          protocol: TCP
{{- end -}}
