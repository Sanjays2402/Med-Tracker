version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: monthly }
